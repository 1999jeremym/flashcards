<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BN1 Test 1 — Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070c; --surface: #0e0e16; --surface2: #14141f; --border: #1e1e2e;
    --text: #e2e2ec; --text-dim: #8888a0; --text-muted: #4a4a60;
    --green: #34d399; --green-bg: #0d2818; --green-border: #1a4d2e;
    --red: #f87171; --red-bg: #2a0f0f; --red-border: #4d1a1a;
    --blue: #60a5fa; --purple: #a78bfa; --orange: #fb923c; --radius: 16px; --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  body::after { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:9999; }
  .app { max-width:580px; margin:0 auto; padding:2rem 1.25rem; min-height:100vh; display:flex; flex-direction:column; }
  .menu-header { text-align:center; margin-bottom:2.5rem; animation:fadeUp 0.6s ease both; }
  .menu-header .eyebrow { font-size:11px; letter-spacing:5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; }
  .menu-header h1 { font-family:'Playfair Display',serif; font-size:3rem; font-weight:800; background:linear-gradient(135deg,var(--green),var(--blue),var(--purple),var(--orange)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1.1; }
  .menu-header .subtitle { color:var(--text-dim); font-size:14px; margin-top:8px; }
  .cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  .cat-btn { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); padding:18px 16px; cursor:pointer; text-align:left; transition:all 0.25s ease; position:relative; overflow:hidden; }
  .cat-btn:hover { opacity:0.9; }
  .cat-btn.active { border-color:currentColor; }
  .cat-btn.inactive { opacity:0.35; }
  .cat-btn .cat-label { font-weight:600; font-size:15px; }
  .cat-btn .cat-count { font-size:12px; color:var(--text-muted); margin-top:4px; }
  .cat-btn .cat-check { position:absolute; top:12px; right:14px; width:20px; height:20px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; transition:all 0.2s; }
  .cat-btn.active .cat-check { background:currentColor; border-color:currentColor; }
  .cat-btn.active .cat-check span { color:var(--bg); }
  .cat-intro { color:var(--green); } .cat-cells { color:var(--blue); } .cat-tissues { color:var(--purple); } .cat-micro { color:var(--orange); }
  .start-btn { width:100%; padding:18px; border-radius:var(--radius); border:none; font-family:'DM Sans'; font-weight:700; font-size:16px; cursor:pointer; transition:all 0.25s; margin-bottom:10px; background:linear-gradient(135deg,var(--green),var(--blue)); color:#000; }
  .start-btn:hover { transform:translateY(-1px); box-shadow:0 8px 30px rgba(52,211,153,0.2); }
  .start-btn:disabled { background:var(--surface2); color:var(--text-muted); cursor:not-allowed; transform:none; box-shadow:none; }
  .anki-btn { width:100%; padding:16px; border-radius:var(--radius); font-family:'DM Sans'; font-weight:500; font-size:14px; cursor:pointer; transition:all 0.2s; background:transparent; border:1px solid var(--border); color:var(--text-dim); }
  .anki-btn:hover { border-color:var(--text-muted); color:var(--text); }
  .anki-hint { text-align:center; color:var(--text-muted); font-size:11px; margin-top:8px; }
  .study-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .study-bar .exit-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-family:'DM Sans'; font-size:14px; }
  .study-bar .exit-btn:hover { color:var(--text); }
  .study-bar .counter { color:var(--text-dim); font-size:13px; font-variant-numeric:tabular-nums; }
  .study-bar .cat-tag { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
  .progress-track { height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; margin-bottom:28px; }
  .progress-fill { height:100%; border-radius:2px; transition:width 0.4s cubic-bezier(0.4,0,0.2,1); }
  .card { min-height:360px; border-radius:20px; padding:2.5rem 2rem; display:flex; flex-direction:column; justify-content:center; position:relative; cursor:pointer; transition:all 0.35s; border:1px solid var(--border); background:var(--surface); overflow-x:auto; }
  .card:hover { border-color:#2a2a3e; }
  .card.flipped { cursor:default; }
  .card .card-label { position:absolute; top:18px; right:22px; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--text-muted); }
  .card .question { font-size:21px; font-weight:600; line-height:1.55; }
  .card .tap-hint { text-align:center; color:var(--text-muted); font-size:12px; margin-top:28px; }
  .card .answer-q { font-size:13px; color:var(--text-dim); font-weight:500; margin-bottom:14px; line-height:1.4; }
  .card .answer-body { font-size:15.5px; line-height:1.8; }
  .card .answer-body b { font-weight:700; }
  .card .graphic { margin:14px 0 4px; text-align:center; overflow-x:auto; }
  .card .graphic svg { max-width:100%; height:auto; }
  .score-buttons { display:flex; gap:14px; margin-top:22px; animation:fadeUp 0.3s ease both; }
  .score-btn { flex:1; padding:17px; border-radius:var(--radius); font-family:'DM Sans'; font-weight:700; font-size:15px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .score-btn:hover { transform:translateY(-1px); }
  .score-btn.again { background:var(--red-bg); border:1px solid var(--red-border); color:var(--red); }
  .score-btn.got-it { background:var(--green-bg); border:1px solid var(--green-border); color:var(--green); }
  .score-btn .key-hint { font-size:10px; font-weight:400; opacity:0.5; }
  .running-score { text-align:center; color:var(--text-muted); font-size:12px; margin-top:18px; font-variant-numeric:tabular-nums; }
  .results { text-align:center; animation:fadeUp 0.5s ease both; padding-top:3rem; }
  .results .emoji { font-size:56px; margin-bottom:8px; }
  .results h2 { font-family:'Playfair Display',serif; font-size:3rem; font-weight:800; }
  .results .summary { color:var(--text-dim); font-size:14px; margin-top:4px; }
  .result-actions { display:flex; gap:12px; justify-content:center; margin:28px 0 36px; }
  .result-actions button { padding:13px 28px; border-radius:var(--radius-sm); font-family:'DM Sans'; font-weight:600; font-size:14px; cursor:pointer; transition:all 0.2s; }
  .back-btn { background:transparent; border:1px solid var(--border); color:var(--text-dim); }
  .back-btn:hover { border-color:var(--text-muted); color:var(--text); }
  .retry-btn { background:linear-gradient(135deg,var(--green),var(--blue)); border:none; color:#000; }
  .retry-btn:hover { transform:translateY(-1px); }
  .missed-section { text-align:left; }
  .missed-section h3 { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px; }
  .missed-card { background:var(--surface); border-radius:var(--radius-sm); padding:16px 18px; margin-bottom:8px; border-left:3px solid; }
  .missed-card .missed-q { font-weight:600; font-size:14px; margin-bottom:6px; line-height:1.4; }
  .missed-card .missed-a { color:var(--text-dim); font-size:13px; line-height:1.5; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .fade-up { animation:fadeUp 0.4s ease both; }
  @media(max-width:480px) { .menu-header h1{font-size:2.2rem} .card{min-height:280px;padding:2rem 1.5rem} .card .question{font-size:18px} .card .answer-body{font-size:14px} }
</style>
</head>
<body>
<div class="app" id="app"></div>

const CARDS = [
{q:"What does 'pneumo' mean?",a:"It means <b>lung / air</b>. Think: pneumonia = lung infection.",cat:"INTRO"},
{q:"What does 'hypo' mean?",a:"It means <b>below / under / not enough</b>. Think: hypoglycaemia = blood sugar too LOW.",cat:"INTRO"},
{q:"What does 'therm' mean?",a:"It means <b>heat / temperature</b>. Think: thermometer, hypothermia (body too cold).",cat:"INTRO"},
{q:"What does 'tachy' mean?",a:"It means <b>fast / rapid</b>. Think: tachycardia = heart beating too FAST.",cat:"INTRO"},
{q:"What does 'vaso' mean?",a:"It means <b>blood vessel</b>. Think: vasoconstriction = vessels getting narrower.",cat:"INTRO"},
{q:"What does 'osteo' mean?",a:"It means <b>bone</b>. Think: osteoporosis = bones getting weak and porous.",cat:"INTRO"},
{q:"What does 'cyte' mean?",a:"It means <b>cell</b>. Can be prefix or suffix. Think: erythro·cyte = red blood cell, leuco·cyte = white blood cell.",cat:"INTRO"},
{q:"What does '-crine' mean?",a:"It means <b>to secrete (release)</b>. Think: endo·crine = releases hormones inside the body.",cat:"INTRO"},
{q:"What does '-pathy' mean?",a:"It means <b>disease or disorder</b>. Think: neuro·pathy = nerve disease.",cat:"INTRO"},
{q:"What does '-some' mean?",a:"It means <b>body or structure</b>. Think: chromo·some = coloured body (carries your DNA).",cat:"INTRO"},
{q:"What does '-logy' mean?",a:"It means <b>the study of</b>. Think: physio·logy = studying how the body works.",cat:"INTRO"},
{q:"What does '-blast' mean?",a:"It means <b>young/forming cell</b>. Think: osteo·blast = a cell that BUILDS new bone.",cat:"INTRO"},
{q:"What does '-algia' mean?",a:"It means <b>pain</b>. Think: neur·algia = nerve pain.",cat:"INTRO"},
{q:"What does '-ism' mean?",a:"It means a <b>condition or state</b>. Think: hypothyroid·ism = the condition of having low thyroid.",cat:"INTRO"},
{q:"What does '-itis' mean?",a:"It means <b>inflammation (swelling)</b>. Think: appendic·itis = inflamed appendix.",cat:"INTRO"},
{q:"What is Anatomy?",a:"The study of <b>body structure</b> — what things look like and where they sit. Like knowing the heart is in the chest.",cat:"INTRO"},
{q:"What is Physiology?",a:"The study of <b>how the body works</b> — what things DO. Like understanding how the heart pumps blood. Shape affects function!",cat:"INTRO"},
{q:"What is Cellular Respiration?",a:"How cells <b>make energy (ATP)</b> using oxygen + glucose. Gives off CO₂ as waste. NOT the same as breathing — breathing just gets air in and out.",cat:"INTRO"},
{q:"What is an Atom?",a:"The <b>tiniest building block</b> of any chemical element. Atoms → molecules → organelles → cells. It's the very first level of organisation.",cat:"INTRO"},
{q:"What does 'Sebaceous' mean?",a:"Relating to <b>sebum</b> — an oily substance. Sebaceous glands pump oil into hair follicles to keep skin and hair soft and waterproof.",cat:"INTRO"},
{q:"What's the mnemonic for the 7 signs of life?",a:"<b>MRS GREN</b><br>🏃 Movement<br>🔋 Respiration (making energy)<br>⚡ Sensitivity (reacting to stuff)<br>📈 Growth<br>👶 Reproduction<br>🚮 Excretion (removing waste)<br>🍎 Nutrition (taking in food)",cat:"INTRO"},
{q:"Excretion vs going to the toilet?",a:"<b>Excretion</b> = getting rid of waste your cells MADE. Lungs breathe out CO₂, kidneys filter out urea.<br><br>Going to the toilet is <b>elimination</b> = passing out undigested food. Different thing!",cat:"INTRO"},
{q:"What are the key directional terms?",a:"Here's a visual map of the main ones:",cat:"INTRO",g:"directions"},
{q:"What are the major body cavities?",a:"Two main sides — dorsal (back) and ventral (front):",cat:"INTRO",g:"cavities"},
{q:"What are the Levels of Organisation?",a:"From simplest building blocks to the whole person:",cat:"INTRO",g:"levels"},
{q:"What's inside a typical human cell?",a:"Here are the main parts and what they do:",cat:"CELLS",g:"cell"},
{q:"What are Labile cells?",a:"Cells that <b>never stop dividing</b> — they replace themselves constantly. Examples: skin cells flaking off, gut lining renewing, blood cells being made in bone marrow.",cat:"CELLS"},
{q:"What are Stable cells?",a:"Cells that <b>normally chill out</b> but CAN divide if needed (like after injury). Examples: liver cells (the liver can actually regrow!), kidney cells.",cat:"CELLS"},
{q:"What are Permanent cells?",a:"Cells that <b>can't divide once mature</b>. Damaged = gone forever, replaced by scar tissue. The big ones: <b>neurons</b> and <b>cardiac muscle</b>. That's why heart attacks cause permanent damage.",cat:"CELLS"},
{q:"Mitosis vs Meiosis?",a:"<b>Mitosis</b> = normal copying for growth/repair. 1 cell → 2 identical copies.<br><br><b>Meiosis</b> = makes sex cells only. 1 cell → 4 unique cells with HALF the DNA. So egg + sperm = full set for baby.",cat:"CELLS"},
{q:"What are the stages of Mitosis?",a:"Remember: <b>PMATC</b> (People Meet And Talk Constantly)",cat:"CELLS",g:"mitosis"},
{q:"Passive vs Active transport?",a:"<b>Passive</b> = stuff moves on its own, NO energy. Like a ball rolling downhill — from lots to less.<br><br><b>Active</b> = needs energy (ATP). Like pushing a ball UPHILL — from less to more.",cat:"CELLS"},
{q:"What is Diffusion?",a:"Particles <b>spread out naturally</b> from crowded → less crowded until even. Like spraying perfume — it fills the room by itself. No energy needed.",cat:"CELLS"},
{q:"What is Facilitated Diffusion?",a:"Same idea as diffusion (no energy, high → low) but the particles <b>need a protein doorway</b> to get through the membrane because they're too big or charged.",cat:"CELLS"},
{q:"What is Osmosis?",a:"Movement of <b>WATER</b> through a membrane. Water moves toward wherever there's more dissolved stuff. Think: <b>water chases the salt</b>.",cat:"CELLS"},
{q:"What happens to cells in different solutions?",a:"It's all about where the water goes:",cat:"CELLS",g:"tonicity"},
{q:"Why are Red Blood Cells shaped like that?",a:"<b>Flat disc with a dip</b> (like a donut without the hole):<br>📐 Max surface area for soaking up oxygen<br>🚫 No nucleus = more room for haemoglobin<br>🤸 Bendy = squeezes through tiny blood vessels",cat:"CELLS"},
{q:"What are the 4 types of tissue?",a:"Every tissue in your body is one of these:",cat:"TISSUES",g:"tissues4"},
{q:"What does Epithelial tissue do?",a:"It <b>covers and lines everything</b> — the body's wallpaper. It protects (skin), absorbs (gut lining), filters (kidneys), and secretes stuff (glands making mucus, hormones, sweat).",cat:"TISSUES"},
{q:"What does Connective tissue do?",a:"<b>Holds everything together</b>. A huge group — bone, cartilage, fat, blood, tendons, ligaments. Key feature: cells are <b>spread out in a matrix</b> (not packed tight like epithelial).",cat:"TISSUES"},
{q:"What can ALL muscle tissue do?",a:"All 3 types share 4 abilities:<br>⚡ <b>Excitability</b> — responds to signals<br>💪 <b>Contractility</b> — can shorten/squeeze<br>↔️ <b>Extensibility</b> — can stretch<br>🔄 <b>Elasticity</b> — springs back",cat:"TISSUES"},
{q:"What does Nervous tissue do?",a:"Your body's <b>electrical wiring</b>. Two cell types: <b>Neurons</b> (carry the signals) and <b>Neuroglia</b> (helpers that feed, protect, and insulate the neurons).",cat:"TISSUES"},
{q:"Compare the 3 muscle types.",a:"Here's the quick breakdown:",cat:"TISSUES",g:"muscles"},
{q:"What does a neuron look like?",a:"Shaped for passing messages fast:",cat:"TISSUES",g:"neuron"},
{q:"Name the 5 types of Neuroglia.",a:"🌟 <b>Astrocytes</b> — support, help form blood-brain barrier<br>🧊 <b>Oligodendrocytes</b> — make myelin in brain/spinal cord<br>🧤 <b>Schwann cells</b> — make myelin in rest of body<br>🛡️ <b>Microglia</b> — immune cells, eat debris<br>💧 <b>Ependymal</b> — line brain cavities, make spinal fluid",cat:"TISSUES"},
{q:"What are the special features of epithelial tissue?",a:"Every type has ALL of these:<br>🚫 <b>Avascular</b> — no blood vessels<br>📍 <b>Basement membrane</b> — anchored below<br>🧱 <b>Packed tight</b> — no gaps<br>⬆️⬇️ <b>Polarity</b> — top side & bottom side<br>⚡ <b>Has nerves</b><br>🔄 <b>Regenerates fast</b><br>🚪 <b>Forms boundaries</b>",cat:"TISSUES"},
{q:"How do you classify epithelial tissue?",a:"Always <b>two words</b>:<br><br><b>Word 1 = layers:</b> Simple (one) · Stratified (many) · Pseudostratified (looks layered but isn't)<br><br><b>Word 2 = shape:</b> Squamous (flat) · Cuboidal (cube) · Columnar (tall) · Transitional (stretchy)",cat:"TISSUES"},
{q:"Where's Simple Squamous epithelium?",a:"In <b>alveoli (lung air sacs)</b> and <b>capillaries</b>. One layer of super-flat cells — thin as possible so gases pass through fast. Thin = fast diffusion!",cat:"TISSUES"},
{q:"Where's Stratified Squamous epithelium?",a:"<b>Skin, mouth, oesophagus</b> — places with lots of wear and tear. Many layers of flat cells. Top ones rub off, bottom ones replace them. Like a conveyor belt of protection.",cat:"TISSUES"},
{q:"Where's Pseudostratified Ciliated Columnar epithelium?",a:"Lining your <b>airways (trachea, bronchi)</b>. Has tiny hairs (cilia) that sweep mucus + trapped germs UP and out. Goblet cells make the mucus. Like a sticky escalator for dirt!",cat:"TISSUES"},
{q:"Endocrine vs Exocrine glands?",a:"<b>Endocrine</b> = releases hormones INTO blood, no tube needed (thyroid, adrenals)<br><br><b>Exocrine</b> = releases stuff ONTO a surface through a tube/duct (sweat glands, salivary glands)",cat:"TISSUES"},
{q:"How do you spot Connective tissue?",a:"Look for:<br>🔹 <b>Matrix</b> between cells (liquid/gel/solid)<br>🔹 <b>Fibres</b> in the matrix<br>🔹 <b>Scattered cells</b> (not packed)<br>🔹 <b>Found inside</b> the body<br>🔹 <b>Variable blood supply</b>",cat:"TISSUES"},
{q:"What is Adipose tissue?",a:"Your <b>body fat</b>! Under skin, around kidneys & heart. Three jobs:<br>🔋 Stores energy (like a battery)<br>🧥 Insulates (keeps you warm)<br>🛡️ Cushions organs (like bubble wrap)",cat:"TISSUES"},
{q:"Dense Regular vs Dense Irregular CT?",a:"<b>Regular</b> = fibres all same direction (like rope). In tendons & ligaments. Strong one way.<br><br><b>Irregular</b> = fibres go every direction (like a net). In skin dermis. Strong from any angle.",cat:"TISSUES"},
{q:"What is Hyaline Cartilage?",a:"Smooth, glassy cartilage on <b>joint surfaces, trachea, ribs</b>. Reduces friction and absorbs shock. Has <b>NO blood supply</b> — that's why cartilage injuries heal so slowly!",cat:"TISSUES"},
{q:"Why is Blood connective tissue?",a:"It ticks all the boxes: <b>cells</b> (red, white, platelets) floating in an <b>extracellular matrix</b> (the liquid plasma). Cells are scattered, not packed.",cat:"TISSUES"},
{q:"What are the 4 body membranes?",a:"Each one lines a different type of space:",cat:"TISSUES",g:"membranes"},
{q:"What are the 4 stages of tissue repair?",a:"When tissue is damaged, healing goes in this order:",cat:"TISSUES",g:"repair"},
{q:"Regeneration vs Fibrosis?",a:"The two possible endings to tissue repair:<br><br>✅ <b>Regeneration</b> = replaced with the <b>same type of cell</b>. Back to normal!<br><br>⚠️ <b>Fibrosis</b> = replaced with <b>scar tissue</b>. Fills the gap but <b>doesn't work the same</b>.",cat:"TISSUES"},
{q:"What useful things do microbes do?",a:"They're not all bad!<br>🌱 Break down dead stuff (recycle nutrients)<br>🌾 Help plants grow (nitrogen fixing)<br>🛡️ Normal flora fights off bad germs<br>🧀 Make food (bread, cheese, yoghurt)<br>💊 Make antibiotics (penicillin = from a fungus!)",cat:"MICRO"},
{q:"How does Gram staining classify bacteria?",a:"Bacteria split into two groups based on colour:",cat:"MICRO",g:"gram"},
{q:"What shapes can bacteria be?",a:"Three basic shapes:",cat:"MICRO",g:"bacshapes"},
{q:"Diplo- vs Strepto- vs Staphylo-?",a:"How bacteria <b>group together</b>:<br><br>👯 <b>Diplo-</b> = in PAIRS<br>⛓️ <b>Strepto-</b> = in CHAINS (like a necklace)<br>🍇 <b>Staphylo-</b> = in CLUSTERS (like grapes)",cat:"MICRO"},
{q:"What are the key parts of a bacterial cell?",a:"🧱 <b>Cell wall</b> — shape + protection<br>🚪 <b>Membrane</b> — controls entry/exit<br>💧 <b>Capsule/slime</b> — sticks to stuff, hides from immune system<br>🦯 <b>Flagella</b> — tail for swimming<br>🤝 <b>Pili</b> — tiny hairs for grabbing<br>⚙️ <b>Ribosomes</b> — make proteins<br>🧬 <b>DNA</b> — instructions (+ plasmids)",cat:"MICRO"},
{q:"What are Endospores?",a:"A bacteria <b>survival pod</b> for bad times (no food, heat, chemicals). It dries out and wraps its DNA in a super-tough shell. Can survive <b>years</b>. When things improve → wakes back up. Example: Clostridium (causes tetanus).",cat:"MICRO"},
{q:"Name some bacteria and what they cause.",a:"🦠 <b>Staph</b> → skin infections, boils<br>🦠 <b>Strep</b> → sore throat, pneumonia<br>🦠 <b>E. coli</b> → UTIs, diarrhoea<br>🦠 <b>Clostridium</b> → tetanus, botulism<br>🦠 <b>H. influenzae</b> → meningitis",cat:"MICRO"},
{q:"How do bacteria reproduce?",a:"<b>Binary fission</b> — the cell just splits in half. One → two identical copies. Every <b>20-30 minutes</b> in perfect conditions, so numbers explode fast!",cat:"MICRO"},
{q:"How are viruses different from bacteria?",a:"Viruses are <b>not even alive!</b><br>📏 Way smaller than bacteria<br>🧬 DNA <b>or</b> RNA (not both)<br>🧥 Protein coat (capsid)<br>🏠 Can't reproduce alone — must hijack a cell<br>🎭 Mutate easily (especially RNA viruses like flu)",cat:"MICRO"},
{q:"How do viruses reproduce?",a:"They hijack your cells in 6 steps:",cat:"MICRO",g:"virus"},
{q:"Name some viruses and their diseases.",a:"🦠 <b>Influenza</b> → flu<br>🦠 <b>Measles virus</b> → measles<br>🦠 <b>HIV</b> → AIDS<br>🦠 <b>Herpes simplex</b> → cold sores<br>🦠 <b>Varicella-zoster</b> → chickenpox<br>🦠 <b>Coronavirus</b> → COVID-19",cat:"MICRO"},
{q:"What's an Opportunistic pathogen?",a:"A germ that <b>lives peacefully on you</b> normally — but takes advantage when your defences are down. Example: Candida lives on skin fine, but causes <b>thrush</b> when you're sick or on antibiotics.",cat:"MICRO"},
{q:"Yeasts vs Moulds?",a:"Both are <b>fungi</b>.<br><br>🍞 <b>Yeasts</b> = single-celled, reproduce by budding. Example: Candida.<br><br>🍄 <b>Moulds</b> = multicellular, made of threads (hyphae) forming a mesh, spread by spores. Think: fuzzy stuff on old bread.",cat:"MICRO"},
{q:"Name some fungal infections.",a:"🍄 Athlete's foot / Ringworm → <b>Dermatophytes</b><br>🍄 Thrush → <b>Candida albicans</b><br>🍄 Pneumonia (weak immunity) → <b>Pneumocystis jirovecii</b><br>🍄 Patchy skin rash → <b>Malassezia furfur</b>",cat:"MICRO"},
{q:"How are Protozoa classified?",a:"By <b>how they move</b>:<br>🏊 <b>Flagella</b> (whip-tail) → Giardia<br>🌊 <b>Cilia</b> (tiny hairs) → Balantidium<br>🦶 <b>Pseudopodia</b> (extending blobs) → Amoeba<br>🚫 <b>Non-motile</b> → Plasmodium (malaria)",cat:"MICRO"},
{q:"Helminths vs Ectoparasites?",a:"<b>Helminths</b> = worms INSIDE you (roundworms, tapeworms). Spread through poo → contaminated food/water.<br><br><b>Ectoparasites</b> = critters ON you (lice, mites, fleas, ticks). Bite, itch, and can pass on diseases.",cat:"MICRO"},
{q:"What is Normal Flora?",a:"<b>Friendly microbes that permanently live on/in you</b>. They help by taking up space so bad germs can't move in. Example: E. coli in your gut helps with digestion.",cat:"MICRO"},
{q:"Normal Flora vs Transient Flora?",a:"<b>Normal</b> = permanent residents — always there.<br><b>Transient</b> = temporary visitors — picked up from touching things, come and go.",cat:"MICRO"},
{q:"What does 'Sterile' mean in the body?",a:"<b>Zero micro-organisms</b>. Most of you has bacteria, but some areas must be germ-free: <b>blood, internal organs, the foetus, serous cavities</b>. Germs getting in = bad news.",cat:"MICRO"},
{q:"Infection vs Disease?",a:"<b>Infection</b> = germs got in and are multiplying. You might not feel it.<br><br><b>Disease</b> = enough damage that you get <b>symptoms</b>. Infection can exist without disease!",cat:"MICRO"},
{q:"What are the 6 types of infection?",a:"😶 <b>Subclinical</b> — no symptoms<br>🏠 <b>Endogenous</b> — your own flora gone rogue<br>🌍 <b>Exogenous</b> — caught from outside<br>📍 <b>Localised</b> — one spot<br>🌐 <b>Systemic</b> — whole body<br>😈 <b>Opportunistic</b> — strikes when immunity is weak",cat:"MICRO"},
{q:"What makes someone more likely to get infected?",a:"🔻 Weak immune system<br>👶👴 Very young or very old<br>🍔 Poor nutrition<br>😰 Stress<br>🏥 Chronic disease (diabetes, cancer)<br>🧼 Poor hygiene",cat:"MICRO"},
{q:"What are the 5 stages of disease?",a:"From first contact to recovery:",cat:"MICRO",g:"disease"},
{q:"Communicable vs Contagious vs Non-communicable?",a:"📤 <b>Communicable</b> = CAN spread person to person (flu)<br>🔥 <b>Contagious</b> = spreads VERY easily (measles)<br>🚫 <b>Non-communicable</b> = CANNOT be caught (diabetes, cancer)",cat:"MICRO"},
{q:"Where do pathogens live? (Reservoirs)",a:"🧑 <b>Humans</b> — most common<br>🐾 <b>Animals</b> — can jump to humans<br>🌍 <b>Environment</b> — soil, water<br>🚪 <b>Fomites</b> — objects (door handles, keyboards)",cat:"MICRO"},
{q:"How do germs get IN and OUT of the body?",a:"<b>Ways IN:</b> skin (cuts), lungs (breathing), gut (eating), urogenital tract, blood (needles)<br><br><b>Ways OUT:</b> coughing/sneezing, poo, wee, blood, skin sores",cat:"MICRO"},
{q:"How are germs transmitted?",a:"👋 Direct contact<br>🚪 Indirect (contaminated objects)<br>💧 Droplets (cough/sneeze, short range)<br>💨 Airborne (floats far)<br>🍽️ Food/water<br>🦟 Vectors (insects)",cat:"MICRO"},
{q:"What is Epidemiology?",a:"The study of <b>how diseases spread, who gets them, and how to control them</b>. Basically disease detectives!",cat:"MICRO"},
{q:"What's a Notifiable Disease?",a:"A disease that <b>must be reported to health authorities by law</b> so they can track outbreaks. NZ examples: <b>TB, Measles, Hepatitis, AIDS, Whooping Cough</b>.",cat:"MICRO"},
{q:"What's a Nosocomial / HCAI infection?",a:"An infection <b>picked up IN a hospital or clinic</b> that you didn't have when you came in. Usually from catheters, surgery, dirty equipment, or poor hand washing. Common culprits: MRSA, E. coli, C. diff.",cat:"MICRO"},
{q:"What are the 6 links in the Chain of Infection?",a:"ALL links must connect for infection to spread. Break any one = stop it:",cat:"MICRO",g:"chain"},
{q:"Sterilisation vs Disinfection?",a:"🔥 <b>Sterilisation</b> = kills EVERYTHING including spores. Extreme methods (autoclave = high pressure steam). For surgical tools.<br><br>🧴 <b>Disinfection</b> = kills most germs but NOT spores. For everyday cleaning.",cat:"MICRO"},
{q:"Standard vs Additional precautions?",a:"<b>Standard</b> = basics for EVERY patient:<br>🧼 Hand hygiene · 🧤 Gloves/gowns · 🗑️ Safe waste disposal<br><br><b>Additional</b> = extra for specific infections:<br>👐 Contact (MRSA) · 💧 Droplet (flu) · 💨 Airborne (TB, measles)",cat:"MICRO"},
{q:"What are Antiseptics?",a:"Chemicals for <b>living tissue</b> (skin, wounds) to kill germs. Think hand sanitiser, iodine on a cut. Don't fully sterilise. Different from <b>disinfectants</b> (for surfaces like benchtops).",cat:"MICRO"},
{q:"How do antibiotics kill bacteria?",a:"Four main attacks:<br>🧱 Wreck the cell wall → bacteria bursts<br>⚙️ Stop protein production → can't grow<br>🔋 Mess up metabolism → starves<br>🧬 Damage DNA/membrane → can't survive",cat:"MICRO"},
{q:"What is Antibiotic Resistance?",a:"Bacteria <b>evolve to survive antibiotics</b>. Happens from:<br>❌ Not finishing your course<br>❌ Using antibiotics unnecessarily<br>❌ Overuse in farming<br><br>Result: infections become <b>much harder to treat</b>. Always finish your antibiotics!",cat:"MICRO"},

// === INDIVIDUAL DIRECTIONAL TERMS (split out for quiz value) ===
{q:"What does 'Superior' (cranial) mean?",a:"Toward the <b>head</b> or upper part. Think: your head is superior to your shoulders.",cat:"INTRO"},
{q:"What does 'Inferior' (caudal) mean?",a:"Away from the head / toward the <b>lower part</b>. Think: your feet are inferior to your knees.",cat:"INTRO"},
{q:"What does 'Anterior' (ventral) mean?",a:"Toward the <b>front</b> of the body. Your belly button is on the anterior side.",cat:"INTRO"},
{q:"What does 'Posterior' (dorsal) mean?",a:"Toward the <b>back</b> of the body. Your spine is posterior.",cat:"INTRO"},
{q:"What does 'Medial' mean?",a:"Toward the <b>midline</b> (centre line) of the body. Your nose is medial to your ears.",cat:"INTRO"},
{q:"What does 'Lateral' mean?",a:"<b>Away from the midline</b>. Your ears are lateral to your nose.",cat:"INTRO"},
{q:"What does 'Proximal' mean?",a:"<b>Closer</b> to where a limb attaches to the body. Your elbow is proximal to your hand.",cat:"INTRO"},
{q:"What does 'Distal' mean?",a:"<b>Further</b> from where a limb attaches. Your fingers are distal to your elbow.",cat:"INTRO"},
{q:"What does 'Superficial' mean?",a:"Toward or at the <b>body surface</b>. Skin is superficial to muscle.",cat:"INTRO"},
{q:"What does 'Deep' mean?",a:"<b>Away from the body surface</b> (more internal). Bone is deep to muscle.",cat:"INTRO"},

// === INDIVIDUAL BODY CAVITY CARDS ===
{q:"What's in the Dorsal body cavity?",a:"Protects the <b>nervous system</b>. Two parts:<br>🧠 <b>Cranial cavity</b> (skull) = protects the brain<br>🦴 <b>Spinal cavity</b> (vertebral column) = protects the spinal cord",cat:"INTRO"},
{q:"What's in the Ventral body cavity?",a:"Protects your <b>organs (viscera)</b>. Two parts:<br>🫁 <b>Thoracic cavity</b> (ribs) = heart and lungs<br>🫃 <b>Abdominopelvic cavity</b> (lower) = stomach, intestines, bladder, reproductive organs",cat:"INTRO"},

// === INDIVIDUAL LEVELS OF ORGANISATION ===
{q:"What is the Chemical level of organisation?",a:"The <b>simplest level</b>. Atoms join to make molecules, molecules form tiny cell parts (organelles). This is the foundation everything else is built on.",cat:"INTRO"},
{q:"What is the Cellular level of organisation?",a:"<b>Cells</b> — the smallest living units. Each cell is a little factory that does a specific job. Everything alive is made of cells.",cat:"INTRO"},
{q:"What is the Tissue level?",a:"<b>Groups of similar cells</b> working together for one purpose. There are 4 basic types: epithelial, connective, muscle, nervous.",cat:"INTRO"},
{q:"What is the Organ level?",a:"An organ is made of <b>at least 2 tissue types</b> working together. Example: the stomach has muscle tissue, epithelial lining, connective tissue, and nerve tissue.",cat:"INTRO"},
{q:"What are the Levels of Organisation in order?",a:"From simplest to most complex:<br>⚛️ Chemical → 🔬 Cell → 🧫 Tissue → 🫀 Organ → 🫁 Organ System → 🧍 Organism",cat:"INTRO"},

// === INDIVIDUAL CHARACTERISTICS OF LIFE ===
{q:"Describe 'Movement' as a sign of life.",a:"Living things <b>move</b> — the whole body (walking, swimming) OR internally (blood flowing, gut squeezing). Even plants slowly turn toward light.",cat:"INTRO"},
{q:"Describe 'Sensitivity' as a sign of life.",a:"Living things <b>detect and respond</b> to changes around them. Like pulling your hand off a hot stove, pupils shrinking in bright light, or a plant growing toward the sun.",cat:"INTRO"},

// === INDIVIDUAL MITOSIS STAGES ===
{q:"What happens in Prophase?",a:"The DNA (chromatin) <b>bundles up into visible chromosomes</b>. The nuclear envelope starts breaking down. Spindle fibres begin forming. Think: P = Preparing.",cat:"CELLS"},
{q:"What happens in Metaphase?",a:"Chromosomes <b>line up in the Middle</b> of the cell (the metaphase plate). Spindle fibres attach to them. Think: M = Middle.",cat:"CELLS"},
{q:"What happens in Anaphase?",a:"The chromosome copies are <b>pulled Apart</b> to opposite ends of the cell. Think: A = Apart.",cat:"CELLS"},
{q:"What happens in Telophase?",a:"Chromosomes arrive at opposite ends. <b>Two new nuclear envelopes</b> form around each set. Chromosomes start to unwind again. Think: T = Two nuclei.",cat:"CELLS"},
{q:"What happens in Cytokinesis?",a:"The <b>cell pinches in half</b>, creating two identical daughter cells. The actual splitting! Think: C = Cut in two.",cat:"CELLS"},

// === INDIVIDUAL TRANSPORT & TONICITY ===
{q:"What is Passive transport?",a:"Movement across a membrane <b>without using energy</b>. Stuff just moves on its own from where there's LOTS to where there's LESS (down the gradient). Like a ball rolling downhill.",cat:"CELLS"},
{q:"What is Active transport?",a:"Movement across a membrane that <b>needs energy (ATP)</b>. Pushing stuff from where there's LESS to where there's MORE (against the gradient). Like carrying a ball uphill.",cat:"CELLS"},
{q:"What is a Hypertonic solution?",a:"More stuff dissolved OUTSIDE the cell than inside. So <b>water leaves the cell</b> → cell <b>shrinks</b> (crenation). Think: Hyper = too much outside.",cat:"CELLS"},
{q:"What is a Hypotonic solution?",a:"Less stuff dissolved outside than inside. So <b>water rushes INTO the cell</b> → cell <b>swells and may burst</b> (lysis). Think: Hypo = not enough outside.",cat:"CELLS"},
{q:"What is an Isotonic solution?",a:"<b>Same concentration</b> inside and outside. Water goes both ways equally — no net change. Cell stays <b>normal size</b>. Think: Iso = same.",cat:"CELLS"},

// === INDIVIDUAL TISSUE STRUCTURE-FUNCTION CARDS ===
{q:"How does the dermis structure help it do its job?",a:"The dermis is <b>dense irregular connective tissue</b> — collagen fibres go in ALL directions like a net. This means skin can resist <b>tearing from any angle</b>.",cat:"TISSUES"},
{q:"How does alveoli structure help gas exchange?",a:"Alveoli are lined with <b>simple squamous epithelium</b> — just one layer of super-flat cells. The wall is as <b>thin as possible</b> so oxygen and CO₂ can pass through quickly.",cat:"TISSUES"},
{q:"How does cardiac muscle structure help the heart?",a:"Cardiac muscle is <b>striped</b> (for strong contractions) and connected by <b>intercalated discs</b> — gap junctions pass electrical signals instantly so the <b>whole heart beats as one unit</b>.",cat:"TISSUES"},
{q:"How does airway lining structure protect your lungs?",a:"<b>Pseudostratified ciliated columnar epithelium</b>. Goblet cells make sticky mucus that traps dust and germs. Tiny hairs (cilia) beat in waves to <b>sweep the muck UP and out</b>. Like a sticky escalator.",cat:"TISSUES"},

// === INDIVIDUAL MUSCLE TYPE CARDS ===
{q:"What is Skeletal muscle?",a:"The muscle <b>attached to your bones</b>. It's the only type you <b>control voluntarily</b>. It's striped (striated), has many nuclei per cell, and <b>does get tired</b> (fatigues). Moves your body and keeps your posture.",cat:"TISSUES"},
{q:"What is Cardiac muscle?",a:"Found <b>only in the heart wall</b>. Involuntary (you don't control it). Striped, one nucleus per cell. Connected by intercalated discs so the heart beats as one. <b>Cannot regenerate</b> — heart attacks = permanent damage.",cat:"TISSUES"},
{q:"What is Smooth muscle?",a:"Found in the <b>walls of hollow organs</b> (gut, bladder, blood vessels, uterus). Involuntary, not striped, spindle-shaped. <b>Never gets tired</b>. Contracts slowly but can shorten a LOT. Moves food, blood, urine etc.",cat:"TISSUES"},

// === NEURON & NEUROGLIA INDIVIDUAL CARDS ===
{q:"What are the 3 parts of a neuron?",a:"🌿 <b>Dendrites</b> — branching bits that RECEIVE incoming signals<br>🧠 <b>Cell body (Soma)</b> — processes the signals, contains the nucleus<br>📡 <b>Axon</b> — long cable that SENDS the signal away to the next cell",cat:"TISSUES"},
{q:"What is the Myelin sheath?",a:"A <b>fatty insulating layer</b> wrapped around some axons. Like plastic coating on an electrical wire. Makes signals travel <b>much faster</b>. Made by oligodendrocytes (brain/spinal cord) or Schwann cells (rest of body).",cat:"TISSUES"},
{q:"What are the 3 types of neurons?",a:"📥 <b>Sensory</b> — carry info FROM your senses TO the brain/spinal cord<br>📤 <b>Motor</b> — carry instructions FROM brain/spinal cord TO muscles/glands<br>🔗 <b>Interneurons</b> — connect neurons to each other inside the brain and spinal cord",cat:"TISSUES"},

// === TISSUE REPAIR INDIVIDUAL STAGES ===
{q:"What happens during Haemostasis?",a:"<b>Immediately after injury</b>. Blood vessels squeeze tight (constrict) and a <b>blood clot forms</b>. This stops the bleeding and creates a temporary seal over the wound.",cat:"TISSUES"},
{q:"What happens during the Inflammation stage?",a:"Blood vessels widen, <b>white blood cells rush in</b>. You see the 4 signs: <b>redness, heat, swelling, pain</b>. This cleans up dead cells and germs and prepares the area for rebuilding.",cat:"TISSUES"},
{q:"What happens during Granulation (Organisation)?",a:"<b>New soft tissue forms</b> (granulation tissue). New tiny blood vessels grow in. Fibroblasts start producing <b>collagen</b> (the building material). Blood supply is being restored.",cat:"TISSUES"},

// === MISSING CONNECTIVE TISSUE CARDS ===
{q:"What is Areolar (loose) connective tissue?",a:"Found <b>under skin and around organs/blood vessels</b>. It's the body's packing material — fills gaps between structures and holds organs loosely in place.",cat:"TISSUES"},
{q:"What is Fibrocartilage?",a:"The <b>toughest type of cartilage</b>. Found in intervertebral discs (between spine bones), knee menisci, and pubic symphysis. Acts as a <b>shock absorber</b> between bones.",cat:"TISSUES"},

// === MISSING MICRO CARDS ===
{q:"What issues are related to fungi?",a:"Fungal <b>spores float in the air</b> and can cause:<br>🤧 Allergies and respiratory problems<br>😣 Skin irritation<br>☠️ Some fungi make <b>toxins</b> that can damage organs or even cause cancer",cat:"MICRO"},
{q:"Give 3 examples of protozoal infections.",a:"🦠 <b>Giardia</b> → diarrhoea (from contaminated water)<br>🦠 <b>Entamoeba histolytica</b> → amoebic dysentery<br>🦠 <b>Plasmodium</b> → malaria (spread by mosquito bites)",cat:"MICRO"},
{q:"What body sites are most affected by HCAI?",a:"The four most common sites for hospital-acquired infections:<br>🚽 <b>Urinary tract</b> (often from catheters)<br>🩹 <b>Wounds</b> (surgical sites)<br>🫁 <b>Respiratory tract</b> (ventilator-associated)<br>🩸 <b>Bloodstream</b> (from IV lines)",cat:"MICRO"},
{q:"Name common causative agents of HCAI.",a:"🦠 <b>Staph aureus / MRSA</b> → wound and bloodstream infections<br>🦠 <b>E. coli</b> → UTIs (especially with catheters)<br>🦠 <b>C. difficile</b> → diarrhoea (especially after antibiotics)<br>🦠 <b>Pseudomonas / Klebsiella</b> → pneumonia and bloodstream infections",cat:"MICRO"},
{q:"How can the Chain of Infection be broken?",a:"Break ANY link to stop it:<br>🧹 Kill the germ (clean, disinfect, antibiotics)<br>🏠 Clean the reservoir (keep environments safe)<br>😷 Block the exit (masks, cover coughs)<br>🧼 Stop the spread (hand hygiene, PPE)<br>🧤 Block entry (gloves, protect wounds)<br>💉 Protect people (vaccines, healthy lifestyle)",cat:"MICRO"},
{q:"List the portals of entry for pathogens.",a:"The ways germs get INTO your body:<br>🤕 <b>Skin</b> (through cuts and wounds)<br>🫁 <b>Lungs</b> (breathing them in)<br>🍽️ <b>Gut</b> (eating/drinking contaminated stuff)<br>🚻 <b>Urogenital tract</b><br>💉 <b>Blood</b> (needles, transfusions)",cat:"MICRO"},
];
// ENGINE
let state = {mode:'menu',selectedCats:new Set(['INTRO','CELLS','TISSUES','MICRO']),deck:[],idx:0,flipped:false,score:{correct:0,incorrect:0},reviewed:[]};
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function render(){const app=document.getElementById('app');if(state.mode==='menu')renderMenu(app);else if(state.mode==='study')renderStudy(app);else renderResults(app);}

function renderMenu(app){
  const counts={};for(const k of Object.keys(CATEGORIES))counts[k]=CARDS.filter(c=>c.cat===k).length;
  const totalSelected=CARDS.filter(c=>state.selectedCats.has(c.cat)).length;
  app.innerHTML=`<div style="flex:1;display:flex;flex-direction:column;justify-content:center"><div class="menu-header"><div class="eyebrow">BN1 Test 1</div><h1>Flashcards</h1><div class="subtitle">${CARDS.length} cards · simple language · with diagrams</div></div><div class="cat-grid">${Object.entries(CATEGORIES).map(([key,cat])=>{const active=state.selectedCats.has(key);return`<button class="cat-btn ${cat.css} ${active?'active':'inactive'}" data-cat="${key}"><div class="cat-label">${cat.label}</div><div class="cat-count">${counts[key]} cards</div><div class="cat-check"><span>${active?'✓':''}</span></div></button>`;}).join('')}</div><button class="start-btn" ${totalSelected===0?'disabled':''} id="startBtn">Study ${totalSelected} Cards</button><button class="anki-btn" ${totalSelected===0?'disabled':''} id="ankiBtn">⬇ Download Anki Import File (.txt)</button><div class="anki-hint">Import via Anki → File → Import</div></div>`;
  app.querySelectorAll('.cat-btn').forEach(btn=>{btn.addEventListener('click',()=>{const cat=btn.dataset.cat;if(state.selectedCats.has(cat))state.selectedCats.delete(cat);else state.selectedCats.add(cat);render();});});
  document.getElementById('startBtn')?.addEventListener('click',startStudy);
  document.getElementById('ankiBtn')?.addEventListener('click',downloadAnki);
}

function renderStudy(app){
  const card=state.deck[state.idx];const cat=CATEGORIES[card.cat];const progress=((state.idx+1)/state.deck.length)*100;
  const answerHTML=card.g?card.a+`<div class="graphic">${GFX[card.g]||''}</div>`:card.a;
  app.innerHTML=`<div class="study-bar fade-up"><button class="exit-btn" id="exitBtn">✕ Exit</button><span class="counter">${state.idx+1} / ${state.deck.length}</span><span class="cat-tag" style="color:${cat.accent}">${cat.label}</span></div><div class="progress-track fade-up"><div class="progress-fill" style="width:${progress}%;background:linear-gradient(90deg,${cat.accent},${cat.accent}88)"></div></div><div class="card ${state.flipped?'flipped':''} fade-up" id="cardEl" style="${state.flipped?`background:${cat.accent}06;border-color:${cat.accent}22`:''}"><div class="card-label" style="${state.flipped?`color:${cat.accent}88`:''}">${state.flipped?'Answer':'Question'}</div>${!state.flipped?`<div class="question">${card.q}</div><div class="tap-hint">Tap to reveal · Space / Enter</div>`:`<div class="answer-q">${card.q}</div><div class="answer-body" style="color:${cat.accent}dd">${answerHTML}</div>`}</div>${state.flipped?`<div class="score-buttons"><button class="score-btn again" id="againBtn">✕ Again <span class="key-hint">←</span></button><button class="score-btn got-it" id="gotItBtn">✓ Got it <span class="key-hint">→</span></button></div>`:''}<div class="running-score">${state.score.correct} ✓ · ${state.score.incorrect} ✕</div>`;
  document.getElementById('exitBtn').addEventListener('click',()=>{state.mode='menu';render();});
  document.getElementById('cardEl').addEventListener('click',()=>{if(!state.flipped){state.flipped=true;render();}});
  document.getElementById('againBtn')?.addEventListener('click',()=>handleScore(false));
  document.getElementById('gotItBtn')?.addEventListener('click',()=>handleScore(true));
}

function renderResults(app){
  const pct=state.deck.length>0?Math.round((state.score.correct/state.deck.length)*100):0;
  const missed=state.reviewed.filter(r=>!r.correct);const emoji=pct>=80?'🎉':pct>=50?'💪':'📚';
  app.innerHTML=`<div class="results"><div class="emoji">${emoji}</div><h2>${pct}%</h2><div class="summary">${state.score.correct} correct · ${state.score.incorrect} to review · ${state.deck.length} total</div><div class="result-actions"><button class="back-btn" id="backBtn">Back to Menu</button><button class="retry-btn" id="retryBtn">Study Again</button></div>${missed.length>0?`<div class="missed-section"><h3>Cards to Review</h3>${missed.map(m=>`<div class="missed-card" style="border-left-color:${CATEGORIES[m.cat].accent}"><div class="missed-q">${m.q}</div><div class="missed-a">${(m.a||'').replace(/<[^>]*>/g,'')}</div></div>`).join('')}</div>`:''}</div>`;
  document.getElementById('backBtn').addEventListener('click',()=>{state.mode='menu';render();});
  document.getElementById('retryBtn').addEventListener('click',startStudy);
}

function startStudy(){
  const f=CARDS.filter(c=>state.selectedCats.has(c.cat));if(!f.length)return;
  state.deck=shuffle(f);state.idx=0;state.flipped=false;state.score={correct:0,incorrect:0};state.reviewed=[];state.mode='study';render();
}
function handleScore(correct){
  const card=state.deck[state.idx];state.reviewed.push({...card,correct});
  if(correct)state.score.correct++;else state.score.incorrect++;
  if(state.idx+1>=state.deck.length)state.mode='results';else{state.idx++;state.flipped=false;}render();
}
function downloadAnki(){
  const f=CARDS.filter(c=>state.selectedCats.has(c.cat));
  const strip=s=>(s||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&');
  const header="#separator:tab\n#html:false\n#tags column:3\n";
  const lines=f.map(c=>`${c.q}\t${strip(c.a)}\t${CATEGORIES[c.cat].label.replace(/ /g,'_')}`);
  const blob=new Blob([header+lines.join('\n')],{type:'text/plain'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='bn1_flashcards_anki.txt';a.click();URL.revokeObjectURL(url);
}
document.addEventListener('keydown',e=>{
  if(state.mode!=='study')return;
  if((e.key===' '||e.key==='Enter')&&!state.flipped){e.preventDefault();state.flipped=true;render();}
  if(state.flipped&&e.key==='ArrowRight')handleScore(true);
  if(state.flipped&&e.key==='ArrowLeft')handleScore(false);
});
render();
</script>
